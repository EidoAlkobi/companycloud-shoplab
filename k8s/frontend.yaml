apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels: {app: frontend}
spec:
  replicas: 1
  selector:
    matchLabels: {app: frontend}
  template:
    metadata:
      labels: {app: frontend}
    spec:
      containers:
      - name: app
        image: companycloud-shoplab:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: SERVICE_NAME
          value: "frontend"
        - name: CATALOG_URL
          value: "http://catalog:8080"
        - name: CART_URL
          value: "http://cart:8080"
        - name: CHECKOUT_URL
          value: "http://checkout:8080"
        - name: RECOMMENDATION_URL
          value: "http://recommendation:8080"
        resources:
          requests: {cpu: "50m", memory: "64Mi"}
          limits: {cpu: "300m", memory: "192Mi"}
        readinessProbe:
          httpGet: {path: /health, port: 8080}
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet: {path: /health, port: 8080}
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector: {app: frontend}
  ports:
  - name: http
    port: 8080
    targetPort: 8080
