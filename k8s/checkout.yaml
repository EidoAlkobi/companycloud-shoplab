apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  labels: {app: checkout}
spec:
  replicas: 1
  selector:
    matchLabels: {app: checkout}
  template:
    metadata:
      labels: {app: checkout}
    spec:
      containers:
      - name: app
        image: companycloud-shoplab:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: SERVICE_NAME
          value: "checkout"
        - name: CATALOG_URL
          value: "http://catalog:8080"
        - name: PAYMENT_URL
          value: "http://payment:8080"
        - name: INVENTORY_URL
          value: "http://inventory:8080"
        resources:
          requests: {cpu: "50m", memory: "64Mi"}
          limits: {cpu: "200m", memory: "192Mi"}
        readinessProbe:
          httpGet: {path: /health, port: 8080}
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet: {path: /health, port: 8080}
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: checkout
spec:
  selector: {app: checkout}
  ports:
  - name: http
    port: 8080
    targetPort: 8080
