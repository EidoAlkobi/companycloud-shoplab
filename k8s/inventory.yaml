apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory
  labels: {app: inventory}
spec:
  replicas: 1
  selector:
    matchLabels: {app: inventory}
  template:
    metadata:
      labels: {app: inventory}
    spec:
      containers:
      - name: app
        image: companycloud-shoplab:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: SERVICE_NAME
          value: "inventory"

        resources:
          requests: {cpu: "50m", memory: "64Mi"}
          limits: {cpu: "200m", memory: "128Mi"}
        readinessProbe:
          httpGet: {path: /health, port: 8080}
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet: {path: /health, port: 8080}
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: inventory
spec:
  selector: {app: inventory}
  ports:
  - name: http
    port: 8080
    targetPort: 8080
